services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: aloo_smm
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - aloo_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d aloo_smm"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  aloo_postgres_data:
